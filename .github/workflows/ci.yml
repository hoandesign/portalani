name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and assemble APKs
        run: ./gradlew test assembleDebug assembleRelease

  emulator-ui-tests:
    runs-on: ubuntu-latest
    # Emulator smoke tests can flake; do not block merges while we stabilize CI.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Compose smoke tests on emulator (API 29, landscape)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb shell settings put system accelerometer_rotation 0
            adb shell settings put system user_rotation 1
            ./gradlew connectedDebugAndroidTest
