<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      width: 512px;
      height: 512px;
      background: #1a1a1a;
    }
    .icon {
      width: 512px;
      height: 512px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 20%, #ff7eb6 0%, #7b5cff 45%, #1a1a1a 100%);
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: white;
      font-size: 220px;
      font-weight: 800;
      letter-spacing: -8px;
      text-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="icon">A</div>
</body>
</html>
